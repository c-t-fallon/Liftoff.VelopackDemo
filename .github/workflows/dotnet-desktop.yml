name: .NET Core Desktop

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  deploy-to-github-releases:
    runs-on: windows-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Get Version from Project File
      id: get-version
      shell: bash
      run: echo "version=$(grep -oE '<Version>[^<]+' Liftoff.VelopackDemo/Liftoff.VelopackDemo.csproj | sed 's/<Version>//')" >> $GITHUB_OUTPUT

    # Install the .NET Core workload
    - name: Install .NET Core
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Publish Application
      run: dotnet publish Liftoff.VelopackDemo/Liftoff.VelopackDemo.csproj -c Release -o publish -r win-x64 --self-contained true
