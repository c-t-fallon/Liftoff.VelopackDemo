permissions:
  contents: write

name: .NET Core Desktop

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  deploy-to-github-releases:
    runs-on: windows-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Install GitVersion
      uses: gittools/actions/gitversion/setup@v4.3.3
      with:
        versionSpec: '6.6.x'

    - name: Determine Version
      id: version_step # step id used as a reference for output values
      uses: gittools/actions/gitversion/execute@v4.3.3
      with:
        updateProjectFiles: 'true'
      
    - name: Get Version from Project File
      id: get-version
      shell: bash
      run: echo "version=$(grep -oE '<Version>[^<]+' Liftoff.VelopackDemo/Liftoff.VelopackDemo.csproj | sed 's/<Version>//')" >> $GITHUB_OUTPUT

    # Install the .NET Core workload
    - name: Install .NET Core
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Publish Application
      run: dotnet publish Liftoff.VelopackDemo/Liftoff.VelopackDemo.csproj -c Release -o publish -r win-x64 --self-contained true

    - name: Create Velopack Release
      run: |
        dotnet tool install -g vpk
        vpk download github --repoUrl https://github.com/${{ github.repository }}
        vpk pack -u MyUniqueIdentifier -v ${{ steps.get-version.outputs.version }} -p publish
        vpk upload github --repoUrl https://github.com/${{ github.repository }} --publish --releaseName "MyProject ${{ steps.get-version.outputs.version }}" --tag v${{ steps.get-version.outputs.version }}
